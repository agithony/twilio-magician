name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-twilio-magician
  APP_NAME: twilio-magician
  LOCATION: centralus
  ACR_NAME: twiliomagician
  ENV_NAME: cae-twilio-magician
  IMAGE_TAG: twilio-magician:${{ github.sha }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: needs.ci.result == 'success'

    steps:
      - uses: actions/checkout@v6

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Resource Group
        run: az group create --name $RESOURCE_GROUP --location $LOCATION 2>/dev/null || true

      - name: Ensure Container Registry
        run: az acr create --resource-group $RESOURCE_GROUP --name $ACR_NAME --sku Basic --admin-enabled true 2>/dev/null || true

      - name: Ensure Container Apps Environment
        run: az containerapp env create --name $ENV_NAME --resource-group $RESOURCE_GROUP --location $LOCATION 2>/dev/null || true

      - name: Build and push image
        run: az acr build --registry $ACR_NAME --image $IMAGE_TAG --image twilio-magician:latest .

      - name: Get ACR credentials
        id: acr
        run: |
          echo "server=$(az acr show --name $ACR_NAME --query loginServer -o tsv)" >> $GITHUB_OUTPUT
          echo "username=$(az acr credential show --name $ACR_NAME --query username -o tsv)" >> $GITHUB_OUTPUT
          echo "password=$(az acr credential show --name $ACR_NAME --query 'passwords[0].value' -o tsv)" >> $GITHUB_OUTPUT

      - name: Deploy Container App
        run: |
          EXISTS=$(az containerapp show --name $APP_NAME --resource-group $RESOURCE_GROUP 2>/dev/null && echo "yes" || echo "no")
          if [ "$EXISTS" = "yes" ]; then
            az containerapp update \
              --name $APP_NAME \
              --resource-group $RESOURCE_GROUP \
              --image ${{ steps.acr.outputs.server }}/$IMAGE_TAG
          else
            az containerapp create \
              --name $APP_NAME \
              --resource-group $RESOURCE_GROUP \
              --environment $ENV_NAME \
              --image ${{ steps.acr.outputs.server }}/$IMAGE_TAG \
              --registry-server ${{ steps.acr.outputs.server }} \
              --registry-username ${{ steps.acr.outputs.username }} \
              --registry-password ${{ steps.acr.outputs.password }} \
              --target-port 8080 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 1
          fi

      - name: Print app URL
        run: |
          echo "App URL:"
          az containerapp show --name $APP_NAME --resource-group $RESOURCE_GROUP --query properties.configuration.ingress.fqdn -o tsv
