name: Auto-merge Dependabot

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve minor/patch updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for CI to pass
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: |
          echo "Waiting for Validate check to complete..."
          TIMEOUT=600
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATE=$(gh pr checks "$PR_URL" --json name,state \
              --jq '.[] | select(.name == "Validate") | .state' 2>/dev/null || true)
            if [ "$STATE" = "SUCCESS" ]; then
              echo "CI passed"
              exit 0
            elif [ "$STATE" = "FAILURE" ] || [ "$STATE" = "ERROR" ]; then
              echo "CI failed ($STATE) — skipping merge"
              exit 1
            fi
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          echo "Timed out waiting for CI after ${TIMEOUT}s"
          exit 1
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge minor/patch updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
